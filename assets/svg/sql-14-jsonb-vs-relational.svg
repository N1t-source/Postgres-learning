
      <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="JSONB versus relational diagram">
        <rect width="1200" height="700" fill="#0b0f14"/>
        <text x="80" y="100" fill="#93c5fd" font-family="monospace" font-size="30">structured and semi-structured data</text>
        <rect x="100" y="190" width="420" height="360" rx="20" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
        <text x="145" y="245" fill="#ffffff" font-family="monospace" font-size="26">relational table</text>
        <text x="145" y="320" fill="#9ca3af" font-family="monospace" font-size="22">id | name | region</text>
        <text x="145" y="370" fill="#9ca3af" font-family="monospace" font-size="22">fixed columns</text>
        <rect x="650" y="190" width="420" height="360" rx="20" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
        <text x="695" y="245" fill="#ffffff" font-family="monospace" font-size="26">jsonb document</text>
        <text x="695" y="320" fill="#9ca3af" font-family="monospace" font-size="22">{ "name": "...", ... }</text>
        <text x="695" y="370" fill="#9ca3af" font-family="monospace" font-size="22">flexible nested shape</text>
      </svg>