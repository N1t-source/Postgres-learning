
      <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Join types diagram">
        <rect width="1200" height="700" fill="#0b0f14"/>
        <text x="78" y="95" fill="#93c5fd" font-family="monospace" font-size="30">join types</text>
        <circle cx="470" cy="330" r="165" fill="rgba(96,165,250,0.18)" stroke="#60a5fa" stroke-width="4"/>
        <circle cx="650" cy="330" r="165" fill="rgba(52,211,153,0.18)" stroke="#34d399" stroke-width="4"/>
        <text x="360" y="330" fill="#ffffff" font-family="monospace" font-size="28">left table</text>
        <text x="665" y="330" fill="#ffffff" font-family="monospace" font-size="28">right table</text>
        <text x="510" y="340" fill="#f8fafc" font-family="monospace" font-size="28">INNER</text>
        <text x="155" y="520" fill="#60a5fa" font-family="monospace" font-size="24">LEFT JOIN keeps all from left</text>
        <text x="155" y="560" fill="#34d399" font-family="monospace" font-size="24">RIGHT JOIN keeps all from right</text>
        <text x="155" y="600" fill="#f59e0b" font-family="monospace" font-size="24">FULL JOIN keeps both sides</text>
      </svg>