<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 370" width="680" height="370" role="img" aria-labelledby="title desc">
  <title id="title">Insert and select flow diagram</title>
  <desc id="desc">A flow that shows one inserted row and one selected row.</desc>
  <rect width="680" height="370" fill="#111111"/>
  <g fill="none" stroke="#ff5ca8" stroke-width="2">
    <rect x="38" y="108" width="156" height="154" rx="18"/>
    <rect x="262" y="108" width="156" height="154" rx="18"/>
    <rect x="486" y="108" width="156" height="154" rx="18"/>
    <path d="M194 185 H262"/>
    <path d="M418 185 H486"/>
  </g>
  <g fill="#ffffff" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="14">
    <text x="64" y="142">INSERT</text>
    <text x="282" y="142">TABLE ROW</text>
    <text x="514" y="142">SELECT</text>
  </g>
  <g fill="#bfbfbf" font-family="ui-monospace, Menlo, Consolas, monospace" font-size="11">
    <text x="58" y="168">values go in</text>
    <text x="58" y="188">one tuple added</text>
    <text x="282" y="168">stored in heap</text>
    <text x="282" y="188">visible to queries</text>
    <text x="500" y="168">row comes back</text>
    <text x="500" y="188">prove state changed</text>
  </g>
</svg>
