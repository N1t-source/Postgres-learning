
      <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Index and B-tree diagram">
        <rect width="1200" height="700" fill="#0b0f14"/>
        <text x="80" y="100" fill="#93c5fd" font-family="monospace" font-size="30">index versus table scan</text>
        <rect x="80" y="180" width="400" height="360" rx="20" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
        <text x="120" y="235" fill="#ffffff" font-family="monospace" font-size="24">table rows</text>
        <text x="120" y="300" fill="#9ca3af" font-family="monospace" font-size="22">scan every row</text>
        <text x="120" y="350" fill="#9ca3af" font-family="monospace" font-size="22">look for target value</text>
        <text x="120" y="400" fill="#9ca3af" font-family="monospace" font-size="22">slower for big tables</text>
        <rect x="650" y="180" width="420" height="360" rx="20" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
        <text x="690" y="235" fill="#ffffff" font-family="monospace" font-size="24">B-tree index</text>
        <rect x="720" y="280" width="280" height="60" rx="10" fill="#111827" stroke="#34d399" stroke-width="2"/>
        <text x="750" y="320" fill="#ffffff" font-family="monospace" font-size="22">search value</text>
        <line x1="860" y1="340" x2="860" y2="410" stroke="#34d399" stroke-width="4"/>
        <text x="730" y="450" fill="#9ca3af" font-family="monospace" font-size="22">jump to matching rows faster</text>
      </svg>