        <rect x="108" y="178" width="984" height="420" rx="8" fill="#0f0f13" opacity="0.46"/>
        <g fill="none" stroke="#f5f5f5" stroke-width="2.4">
          <rect x="124" y="180" width="220" height="222"/>
