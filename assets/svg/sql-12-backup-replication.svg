            <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.11 0 1 0 0 0.59 0 0 1 0 0.44 0 0 0 0.7 0"/>
          </filter>
        </defs>
        <rect width="1200" height="700" fill="#0a0a0d"/>
        <rect x="28" y="26" width="1144" height="648" rx="28" fill="#0d1016" stroke="#1c2330" stroke-width="2"/>
