
      <svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Aggregation and grouping diagram">
        <rect width="1200" height="700" fill="#0b0f14"/>
        <text x="80" y="100" fill="#93c5fd" font-family="monospace" font-size="30">group rows into buckets</text>
        <rect x="90" y="180" width="300" height="360" rx="20" fill="#0f172a" stroke="#60a5fa" stroke-width="3"/>
        <text x="120" y="230" fill="#ffffff" font-family="monospace" font-size="24">raw rows</text>
        <text x="120" y="290" fill="#9ca3af" font-family="monospace" font-size="22">Canada | Americas</text>
        <text x="120" y="340" fill="#9ca3af" font-family="monospace" font-size="22">Japan  | Asia</text>
        <text x="120" y="390" fill="#9ca3af" font-family="monospace" font-size="22">Kenya  | Africa</text>
        <text x="120" y="440" fill="#9ca3af" font-family="monospace" font-size="22">Chile  | Americas</text>
        <rect x="520" y="180" width="300" height="360" rx="20" fill="#0f172a" stroke="#34d399" stroke-width="3"/>
        <text x="550" y="230" fill="#ffffff" font-family="monospace" font-size="24">GROUP BY region</text>
        <text x="550" y="300" fill="#ffffff" font-family="monospace" font-size="22">Americas | 2</text>
        <text x="550" y="350" fill="#ffffff" font-family="monospace" font-size="22">Asia     | 1</text>
        <text x="550" y="400" fill="#ffffff" font-family="monospace" font-size="22">Africa   | 1</text>
        <text x="550" y="470" fill="#fbbf24" font-family="monospace" font-size="22">COUNT(*)</text>
        <rect x="900" y="180" width="220" height="360" rx="20" fill="#0f172a" stroke="#f59e0b" stroke-width="3"/>
        <text x="930" y="230" fill="#ffffff" font-family="monospace" font-size="24">HAVING</text>
        <text x="930" y="300" fill="#ffffff" font-family="monospace" font-size="22">Americas</text>
        <text x="930" y="350" fill="#ffffff" font-family="monospace" font-size="22">Asia</text>
        <text x="930" y="400" fill="#475569" font-family="monospace" font-size="22">Africa</text>
      </svg>