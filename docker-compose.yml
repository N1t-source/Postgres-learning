services:
  postgres:
    image: postgres:17-alpine
    container_name: postgres-learning-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: learner
      POSTGRES_PASSWORD: learner
      POSTGRES_DB: bookstore
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U learner -d bookstore"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
